site_name: Robot MCP Control System
site_description: Natural language robot control using FastMCP with multi-LLM support
site_author: Daniel Gaida
site_url: https://dgaida.github.io/robot_mcp/

repo_name: dgaida/robot_mcp
repo_url: https://github.com/dgaida/robot_mcp
edit_uri: edit/master/docs/

theme:
  name: material
  language: de
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - navigation.tracking
    - alternate.style

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      languages:
        - locale: de
          name: Deutsch
          default: true
          build: true
        - locale: en
          name: English
          build: true
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
  - mermaid2:
      arguments:
        theme: material
  - mike:
      alias_type: symlink

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: getting-started.md
  - Configuration: configuration.md
  - Usage: examples.md
  - API Reference: api/index.md
  - Architecture: architecture/index.md
  - Development:
      - Overview: development/index.md
      - Docstring Style: development/docstring_style.md
      - Releasing: development/releasing.md
      - Metrics: development/metrics.md
  - Troubleshooting: troubleshooting.md
  - Changelog: CHANGELOG.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dgaida/robot_mcp
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/robot-mcp/

copyright: Copyright &copy; 2025 Daniel Gaida
